<svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background circle -->
  <circle cx="80" cy="80" r="80" fill="#F0F6FF"/>

  <!-- Outer ring -->
  <circle cx="80" cy="80" r="72" fill="none" stroke="#1A56DB" stroke-width="9"/>

  <!-- Dollar pill (left) -->
  <rect x="20" y="62" width="48" height="30" rx="15" fill="#1A56DB"/>
  <text x="44" y="82" text-anchor="middle" fill="white" font-size="18" font-weight="700">$</text>

  <!-- Arrow -->
  <line x1="72" y1="77" x2="98" y2="77" stroke="#1A56DB" stroke-width="5" stroke-linecap="round"/>
  <polygon points="98,67 116,77 98,87" fill="#1A56DB"/>

  <!-- Result pill (right) -->
  <rect x="114" y="62" width="48" height="30" rx="15" fill="#DBEAFE"/>
  <text x="138" y="82" text-anchor="middle" fill="#1A56DB" font-size="16" font-weight="700">✓</text>

  <!-- Mini bar chart -->
  <rect x="30"  y="112" width="11" height="24" rx="3" fill="#93C5FD"/>
  <rect x="46"  y="102" width="11" height="34" rx="3" fill="#1A56DB"/>
  <rect x="62"  y="107" width="11" height="29" rx="3" fill="#93C5FD"/>
  <rect x="78"  y="98"  width="11" height="38" rx="3" fill="#BFDBFE"/>
  <rect x="94"  y="105" width="11" height="31" rx="3" fill="#93C5FD"/>
  <rect x="110" y="109" width="11" height="27" rx="3" fill="#93C5FD"/>

  <!-- Best bar checkmark badge -->
  <circle cx="51" cy="95" r="10" fill="#22C55E"/>
  <polyline points="46,95 50,99 57,89" fill="none" stroke="white" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>

</svg>
